services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=radio_user
      - POSTGRES_PASSWORD=radio_password
      - POSTGRES_DB=radio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://radio_user:radio_password@db:5432/radio_db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-default_secret_for_dev_only}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - BETTER_AUTH_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - db

volumes:
  postgres_data:
